<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Predictor</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <main class="app-container">
    <header>
      <h1>Match Predictor</h1>
    </header>
    <div id="error-box" class="hidden"></div>
    <form id="prediction-form">
      <div class="teams-row">
        <div class="team-card">
          <label for="home-team">Home Team</label>
          <select id="home-team" name="home_team" required>
            <option value="" disabled selected>Select Home Team</option>
          </select>
        </div>

        <div class="team-card">
          <label for="away-team">Away Team</label>
          <select id="away-team" name="away_team" required>
            <option value="" disabled selected>Select Away Team</option>
          </select>
        </div>
      </div>

      <button type="submit" id="submit-btn">Predict Outcome</button>
    </form>

    <div id="result-container" class="hidden">
      <h2 id="predicted-winner"></h2>
      
      <div class="probabilities-display">
        <div class="prob-stat">
          <span>Home Win</span>
          <strong id="prob-home">--%</strong>
        </div>
        <div class="prob-stat draw-stat">
          <span>Draw</span>
          <strong id="prob-draw">--%</strong>
        </div>
        <div class="prob-stat">
          <span>Away Win</span>
          <strong id="prob-away">--%</strong>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
